<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏀 NBA Ticket Price Tracker</title>
    <style>
        :root {
            --bg: #0f0f23;
            --card-bg: #1a1a2e;
            --accent: #e94560;
            --text: #eee;
            --muted: #888;
            --green: #00c853;
            --red: #ff1744;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 2.2rem; margin-bottom: 0.5rem; }
        .header p { color: var(--muted); font-size: 1rem; }
        .status-bar {
            display: flex; justify-content: center; gap: 1.5rem;
            margin-bottom: 2rem; flex-wrap: wrap;
        }
        .status-item {
            background: var(--card-bg); padding: 0.6rem 1.2rem;
            border-radius: 8px; font-size: 0.85rem;
        }
        .status-item span { color: var(--accent); font-weight: 600; }
        .games-container { max-width: 900px; margin: 0 auto; }
        .game-card {
            background: var(--card-bg); border-radius: 12px;
            padding: 1.5rem; margin-bottom: 1.5rem;
            border-left: 4px solid var(--accent);
        }
        .game-card.lakers { border-left-color: #552583; }
        .game-card.clippers { border-left-color: #c8102e; }
        .game-card h3 { margin-bottom: 0.3rem; font-size: 1.15rem; }
        .game-meta { color: var(--muted); font-size: 0.85rem; margin-bottom: 1rem; }
        .sources { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .source-badge {
            padding: 0.4rem 0.8rem; border-radius: 6px;
            font-size: 0.9rem; font-weight: 600;
        }
        .source-badge.vivid { background: rgba(0,200,83,0.15); color: var(--green); }
        .source-badge.stubhub { background: rgba(66,133,244,0.15); color: #42a5f5; }
        .source-badge.seatgeek { background: rgba(255,152,0,0.15); color: #ffa726; }
        .price-change { font-size: 0.75rem; margin-left: 0.3rem; }
        .price-down { color: var(--green); }
        .price-up { color: var(--red); }
        .stats {
            display: flex; gap: 1.5rem; flex-wrap: wrap;
            padding: 0.6rem 0; border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem; color: var(--muted);
        }
        .stats span { color: var(--text); font-weight: 500; }
        .buy-link {
            display: inline-block; background: var(--accent); color: white;
            text-decoration: none; padding: 0.4rem 0.8rem; border-radius: 6px;
            font-size: 0.8rem; margin-top: 0.5rem; margin-right: 0.5rem;
        }
        .buy-link:hover { opacity: 0.85; }
        .no-data { text-align: center; padding: 4rem 2rem; }
        .no-data h2 { margin-bottom: 1rem; }
        .no-data p { color: var(--muted); line-height: 1.6; }
        .footer {
            text-align: center; margin-top: 2rem;
            color: var(--muted); font-size: 0.8rem;
        }
        .footer a { color: var(--accent); text-decoration: none; }
        #debug { color: var(--muted); font-size: 0.7rem; text-align: center; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏀 NBA Ticket Tracker</h1>
        <p>Lakers & Clippers home games · April 3–11, 2026</p>
    </div>
    <div class="status-bar">
        <div class="status-item">📡 Every <span>6 hours</span></div>
        <div class="status-item">📅 <span>Apr 3 – Apr 11, 2026</span></div>
        <div class="status-item">🕐 <span id="lastUpdate">loading…</span></div>
    </div>
    <div id="content" class="games-container">
        <div class="no-data">
            <h2>⏳ Loading…</h2>
            <p>Fetching latest ticket data…</p>
        </div>
    </div>
    <div id="debug"></div>
    <div class="footer">
        <p>Data from Vivid Seats & StubHub · <a href="https://github.com/jovin-cc/nba-ticket-tracker">GitHub</a></p>
    </div>

    <script>
        async function loadData() {
            const dbg = document.getElementById('debug');
            try {
                const res = await fetch('data/latest.json?' + Date.now());
                if (!res.ok) {
                    dbg.textContent = 'Fetch failed: ' + res.status;
                    return;
                }
                const data = await res.json();
                dbg.textContent = `Loaded ${data.games ? data.games.length : 0} records`;

                if (!data.games || data.games.length === 0) {
                    document.getElementById('content').innerHTML = `
                        <div class="no-data"><h2>⏳ No Data Yet</h2>
                        <p>No ticket listings found. The tracker checks every 6 hours.</p></div>`;
                    return;
                }

                document.getElementById('lastUpdate').textContent =
                    new Date(data.updated_at).toLocaleString();

                // Group records by game title
                const grouped = {};
                data.games.forEach(g => {
                    const key = g.title + '|' + g.date;
                    if (!grouped[key]) grouped[key] = { title: g.title, date: g.date, venue: g.venue, team: g.team, sources: [] };
                    grouped[key].sources.push(g);
                });

                let html = '';
                Object.values(grouped).forEach(game => {
                    const teamClass = game.team.toLowerCase().includes('lakers') ? 'lakers' : 'clippers';
                    const dateStr = new Date(game.date).toLocaleDateString('en-US', {
                        weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
                    });

                    // Sort sources by lowest price
                    const sources = game.sources
                        .filter(s => s.lowest_price != null)
                        .sort((a, b) => a.lowest_price - b.lowest_price);

                    let sourcesHtml = sources.map(s => {
                        const name = s.source === 'vividseats' ? 'Vivid Seats'
                            : s.source === 'stubhub' ? 'StubHub' : 'SeatGeek';
                        const cls = s.source === 'vividseats' ? 'vivid'
                            : s.source === 'stubhub' ? 'stubhub' : 'seatgeek';
                        let changeHtml = '';
                        if (s.price_change != null && Math.abs(s.price_change) > 0.5) {
                            const arrow = s.price_change < 0 ? '📉' : '📈';
                            const pcls = s.price_change < 0 ? 'price-down' : 'price-up';
                            changeHtml = `<span class="price-change ${pcls}">${arrow}$${Math.abs(s.price_change).toFixed(0)}</span>`;
                        }
                        return `<div class="source-badge ${cls}">
                            ${name}: $${s.lowest_price.toFixed(0)}${changeHtml}
                        </div>`;
                    }).join('');

                    // Stats from the vivid seats entry (has most data)
                    const vivid = game.sources.find(s => s.source === 'vividseats');
                    let statsHtml = '';
                    if (vivid) {
                        const parts = [];
                        if (vivid.average_price) parts.push(`Avg: <span>$${vivid.average_price.toFixed(0)}</span>`);
                        if (vivid.listing_count) parts.push(`Listings: <span>${vivid.listing_count}</span>`);
                        if (parts.length) statsHtml = `<div class="stats">${parts.join(' · ')}</div>`;
                    }

                    // Buy links
                    let linksHtml = sources.map(s => {
                        const name = s.source === 'vividseats' ? 'Vivid Seats'
                            : s.source === 'stubhub' ? 'StubHub' : 'SeatGeek';
                        return s.url ? `<a class="buy-link" href="${s.url}" target="_blank">${name} →</a>` : '';
                    }).join('');

                    html += `
                        <div class="game-card ${teamClass}">
                            <h3>🎫 ${game.title}</h3>
                            <div class="game-meta">📅 ${dateStr} · 🏟 ${game.venue}</div>
                            <div class="sources">${sourcesHtml}</div>
                            ${statsHtml}
                            <div>${linksHtml}</div>
                        </div>`;
                });

                document.getElementById('content').innerHTML = html;
            } catch (e) {
                dbg.textContent = 'Error: ' + e.message;
                document.getElementById('content').innerHTML = `
                    <div class="no-data"><h2>❌ Error</h2>
                    <p>${e.message}</p></div>`;
            }
        }
        loadData();
    </script>
</body>
</html>
